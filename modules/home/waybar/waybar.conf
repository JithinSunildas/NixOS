{
  "layer": "top",
    "position": "top",

    "modules-left": [
      "niri/workspaces",
    "niri/window"
    ],

    "modules-center": [
      "custom/clock"
    ],

    "modules-right": [
    "group/tray-expander",
    "battery",
    "custom/notification",
    "custom/exit"
    ],

    "group/tray-expander": {
      "orientation": "inherit",
      "drawer": {
        "transition-duration": 600,
        "children-class": "tray-group-item"
      },
      "modules": [
        "custom/expand-icon",
      "network",
      "pulseaudio",
      "disk",
      "memory",
      "cpu",
      "tray",
      ]
    },

    "niri/workspaces": {
      "format": "{index}{icon}",
      "format-icons": {
        "default": "",
        "active": "ūüĎÄ"
      }
    },

    "wlr/taskbar": {
      "tooltip-format": "{title} | {app_id}"
    },

    "custom/clock": {
      "exec": "date +'%b %d '$(case $(date +%u) in 1) echo 'ŗī§ŗīŅŗīôŗĶćŗīēŗĶĺ';; 2) echo 'ŗīöŗĶäŗīĶŗĶćŗīĶ';; 3) echo 'ŗī¨ŗĶĀŗīßŗĶĽ';; 4) echo 'ŗīĶŗĶćŗīĮŗīĺŗīīŗīā';; 5) echo 'ŗīĶŗĶÜŗī≥ŗĶćŗī≥ŗīŅ';; 6) echo 'ŗī∂ŗī®ŗīŅ';; 7) echo 'ŗīěŗīĺŗīĮŗĶľ';; esac)' %H:%M:%S'",
      "interval": 1,
      "format": "{}",
      "tooltip": true,
      "tooltip-format": "<big>{:%A, %d.%B %Y }</big><tt><small>{calendar}</small></tt>",
      "on-click": "waybar-client --tool-tips toggle"
    },

    "niri/window": {
      "max-length": 60,
      "separate-outputs": false
    },

    "memory": {
      "interval": 5,
      "format": "ÔáÄ  {}%",
      "tooltip": true,
      "on-click": "ghostty -e btop"
    },

    "cpu": {
      "interval": 1,
      "format": "Ôčõ  {usage:2}%",
      "tooltip": true,
      "on-click": "ghostty -e btop"
    },

    "disk": {
      "format": "ÔÄô  {free}",
      "tooltip": true
        // "on-click": "ghostty -e sh -c df -h ; read"
    },

    "network": {
      "format-icons": [
        "ůį§Į",
      "ůį§ü",
      "ůį§Ę",
      "ůį§•",
      "ůį§®"
      ],
      "format-ethernet": "ÔĀ£ {bandwidthDownBits}",
      "format-wifi": "ÔĀ£ {bandwidthDownBits}",
      "format-disconnected": "ůį§ģ",
      "tooltip": true,
      "on-click": "ghostty -e wifitui",
      "on-click-right": "nm-connection-editor",
      "interval": 1
    },

    "custom/expand-icon": {
      "format": "ŗīŹ",
      "tooltip": false
    },

    "tray": {
      "icon-size": 12,
      "spacing": 12
    },

    "pulseaudio": {
      "format": "{format_source} {volume}% {icon}",
      "format-bluetooth": "{volume}% {icon}ÔäĒ {format_source}",
      "format-bluetooth-muted": "Ôö© {icon}ÔäĒ {format_source}",
      "format-muted": "Ôö©",
      "format-source": "ÔĄį",
      "format-source-muted": "ÔĄĪ",
      "format-icons": {
        "headphone": "ÔÄ•",
        "hands-free": "ÔĖź",
        "headset": "ÔĖź",
        "phone": "Ôāē",
        "portable": "Ôāē",
        "car": "ÔÜĻ",
        "default": [
          "ÔÄ¶",
        "ÔÄß",
        "ÔÄ®"
        ]
      },
      "on-click": "pavucontrol"
    },

    "custom/exit": {
      "tooltip": false,
      "format": "‚ŹĽ",
      "on-click": "sleep 0.1 && wlogout"
    },

    "custom/notification": {
      "tooltip": false,
      "format": "{icon}",
      "format-icons": {
        "notification": "ÔÉ≥<span foreground='red'><sup>ÔĎĄ</sup></span>",
        "none": "ÔÉ≥",
        "dnd-notification": "Ôá∂<span foreground='red'><sup>ÔĎĄ</sup></span>",
        "dnd-none": "Ôá∂",
        "inhibited-notification": "ÔÉ≥<span foreground='red'><sup>ÔĎĄ</sup></span>",
        "inhibited-none": "ÔÉ≥",
        "dnd-inhibited-notification": "Ôá∂<span foreground='red'><sup>ÔĎĄ</sup></span>",
        "dnd-inhibited-none": "Ôá∂"
