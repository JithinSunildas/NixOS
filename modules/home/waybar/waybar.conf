        "critical": 15
      },
      "format": "{icon} {capacity}%",
      "format-charging": "ůįāĄ {capacity}%",
      "format-plugged": "ůĪėĖ {capacity}%",
      "format-icons": [
        "ůįĀļ",
      "ůįĀĽ",
      "ůįĀľ",
      "ůįĀĹ",
      "ůįĀĺ",
      "ůįĀŅ",
      "ůįāÄ",
      "ůįāĀ",
      "ůįāā",
      "ůįĀĻ"
      ],
      "on-click": "",
      "tooltip": false,
      "interval": 1
    }
}
